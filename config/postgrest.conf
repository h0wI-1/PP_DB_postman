# =====================================================================
# Конфигурация PostgREST для лабораторной работы 4
# Запуск:   postgrest config/postgrest.conf
# =====================================================================

# Строка подключения к БД PostgreSQL
# Формат: postgres://<user>:<password>@<host>:<port>/<database>
db-uri = "postgres://postgres:postgres@localhost:5432/shop_db"

# Схема, в которой лежат таблицы и функции
db-schema = "public"

# Анонимная роль (когда запрос без токена)
db-anon-role = "web_anon"

# Пул соединений
db-pool = 10

# Секрет для проверки JWT. Должен совпадать с app.jwt_secret в БД.
# Минимальная длина — 32 символа.
jwt-secret = "super_secret_key_change_me_please_32chars"

# Порт, на котором PostgREST будет слушать HTTP-запросы
server-port = 3000

# Хост (0.0.0.0 — принимать соединения со всех интерфейсов,
# 127.0.0.1 — только с локального)
server-host = "127.0.0.1"
